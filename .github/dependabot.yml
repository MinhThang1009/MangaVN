# Dependabot — tự cảnh báo CVE + đề xuất PR cập nhật dependency.
# Quét Gradle (đọc libs.versions.toml + build.gradle.kts) và version của GitHub Actions.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
