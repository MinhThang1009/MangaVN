# Release pipeline (issue #104): push tag v* → build AAB + APK ký bằng release keystore,
# tạo GitHub Release kèm changelog từ conventional commits + mapping.txt (deobfuscate R8).
# workflow_dispatch = dry-run: build + verify chữ ký nhưng KHÔNG tạo Release.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history để tìm tag trước đó khi sinh changelog.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: AuthSecrets (real nếu có secret, stub nếu chưa)
        env:
          WEB_CLIENT_ID: ${{ secrets.AUTH_WEB_CLIENT_ID }}
        run: |
          if [ -z "$WEB_CLIENT_ID" ]; then
            WEB_CLIENT_ID="test-web-client-id.apps.googleusercontent.com"
            echo "::warning::Secret AUTH_WEB_CLIENT_ID chưa set — bản release dùng stub, Google sign-in sẽ KHÔNG hoạt động."
          fi
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<KOTLIN
          package com.example.mybookslibrary.util

          object AuthSecrets {
              const val WEB_CLIENT_ID = "$WEB_CLIENT_ID"
          }
          KOTLIN

      - name: Decode keystore từ secret
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret RELEASE_KEYSTORE_BASE64 chưa set — không thể ký release."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build AAB + APK ký release
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease --console=plain

      - name: Verify chữ ký APK
        run: |
          BT=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -1)
          "$BT/apksigner" verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Changelog từ conventional commits
        if: github.ref_type == 'tag'
        run: |
          TAG="$GITHUB_REF_NAME"
          PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="$PREV..$TAG"
            HEADER="## Thay đổi ($PREV → $TAG)"
          else
            RANGE="$TAG"
            HEADER="## Thay đổi ($TAG — release đầu tiên)"
          fi
          {
            echo "$HEADER"
            echo
            git log --no-merges --pretty='- %s (%h)' "$RANGE"
            echo
            echo '> `mapping.txt` đính kèm để deobfuscate stack trace R8.'
          } > "$RUNNER_TEMP/notes.md"
          cat "$RUNNER_TEMP/notes.md"

      - name: Tạo GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            app/build/outputs/bundle/release/app-release.aab \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/mapping/release/mapping.txt

      # Dry-run (workflow_dispatch): giữ artifact để kiểm tra tay thay vì tạo Release.
      - name: Upload artifacts (dry-run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-dry-run
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 7
