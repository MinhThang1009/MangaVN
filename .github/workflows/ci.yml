# CI — unit test (matrix 3 OS) + static analysis (chỉ ubuntu) trên mỗi push vào main và mỗi PR.
# Static analysis (lint/detekt/ktlint) phân tích TĨNH → kết quả không phụ thuộc OS, chạy 1 lần
# trên ubuntu là đủ. Unit test chạy CẢ 3 OS để bắt bug runtime phụ thuộc nền tảng
# (path separator, line-ending, encoding, locale...).
# AuthSecrets.kt bị .gitignore (chứa secret Google Sign-In) nên CI tự ghi file stub
# với giá trị test để compile được — KHÔNG dùng cho production.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Hủy run cũ khi có commit mới trên CÙNG PR để tiết kiệm runner.
# KHÔNG hủy run trên push main → mỗi commit main giữ được check đầy đủ
# (tránh hiển thị "cancelled" khi merge nhiều PR dồn dập).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Phân tích tĩnh chỉ chạy 1 lần trên ubuntu — kết quả giống nhau mọi OS,
  # chạy lại trên windows/macOS chỉ tốn thời gian mà không thêm tín hiệu.
  static-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # Windows: loại trừ Defender real-time scan cho thư mục build + Gradle home.
      # Defender quét hàng nghìn file Gradle/KSP sinh ra → chậm I/O; exclusion tăng tốc đáng kể.
      # Chỉ exclude 2 path (không tắt toàn bộ AV) + continue-on-error để không chặn CI nếu thiếu quyền.
      - name: Loại trừ Defender cho thư mục build (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.gradle"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Lint + detekt + ktlint
        run: ./gradlew lintDebug detekt ktlintCheck --console=plain

  build-test:
    strategy:
      # Không hủy các OS khác khi một OS fail → thấy kết quả đầy đủ.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Dùng bash trên cả 3 OS để heredoc (stub) và ./gradlew chạy đồng nhất
    # (windows runner mặc định pwsh — có sẵn git bash).
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # Windows: loại trừ Defender real-time scan cho thư mục build + Gradle home.
      # Defender quét hàng nghìn file Gradle/KSP sinh ra → chậm I/O; exclusion tăng tốc đáng kể.
      # Chỉ exclude 2 path (không tắt toàn bộ AV) + continue-on-error để không chặn CI nếu thiếu quyền.
      - name: Loại trừ Defender cho thư mục build (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.gradle"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Chạy unit test
        run: ./gradlew :app:testDebugUnitTest --console=plain

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Tên artifact phải khác nhau theo OS — upload-artifact@v4 cấm trùng tên trong cùng run.
          name: test-report-${{ matrix.os }}
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

  # Instrumented test chạy trên Android emulator (API 34, x86_64) — chỉ ubuntu.
  # Bắt bug runtime không test được JVM: navigation, Hilt DI graph, Activity lifecycle.
  # Chạy sau build-test để chỉ spin emulator khi unit test đã xanh.
  emulator-test:
    needs: build-test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      # Giải phóng disk space trước khi chạy emulator (SDK + system image ~3-4 GB).
      # Không có bước này, runner có thể bị canceled khi compressAssets hết chỗ.
      - name: Giải phóng disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-2* \
                      /usr/local/lib/android/sdk/platforms/android-3[0-2] \
                      /usr/local/lib/android/sdk/build-tools/3[0-2]* \
                      /usr/share/dotnet /usr/local/share/powershell \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      # KVM acceleration cần thiết cho emulator x86_64 chạy nhanh trên Linux runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # Tắt animation hệ thống: giảm flakiness do transition chưa xong khi assert.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --console=plain

      # Tạo combined coverage report (unit .exec + emulator .ec).
      # continue-on-error: unit .exec không có trong job này → jacocoCombinedReport
      # vẫn chạy với .ec only, không fail toàn bộ job nếu thiếu file.
      - name: Tạo combined coverage report (instrumented)
        continue-on-error: true
        run: ./gradlew :app:jacocoCombinedReport --console=plain

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: combined-coverage-report
          path: app/build/reports/jacoco/jacocoCombinedReport/
          if-no-files-found: ignore

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-test-report
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
