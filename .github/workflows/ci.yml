# CI — static analysis, unit test, emulator test chỉ chạy trên ubuntu-latest
# trên mỗi push vào main và mỗi PR.
# AuthSecrets.kt bị .gitignore (chứa secret Google Sign-In) nên CI tự ghi file stub
# với giá trị test để compile được — KHÔNG dùng cho production.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hủy run cũ khi có commit mới trên CÙNG PR để tiết kiệm runner.
# KHÔNG hủy run trên push main → mỗi commit main giữ được check đầy đủ
# (tránh hiển thị "cancelled" khi merge nhiều PR dồn dập).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Xác minh gradle-wrapper.jar không bị tamper (supply chain protection).
  # Chạy riêng trước mọi job khác để fail nhanh nếu wrapper bị giả mạo.
  wrapper-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v4

  # Phân tích tĩnh chỉ chạy 1 lần trên ubuntu.
  static-analysis:
    needs: wrapper-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Lint + detekt + ktlint
        run: ./gradlew lintDebug lintRelease detekt ktlintCheck --console=plain

  build-test:
    needs: wrapper-validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Chạy unit test
        run: ./gradlew :app:testDebugUnitTest --console=plain

      - name: Upload unit test exec (ubuntu — dùng bởi emulator-test cho combined report)
        uses: actions/upload-artifact@v7
        with:
          name: unit-exec
          path: app/build/jacoco/testDebugUnitTest.exec
          if-no-files-found: error

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Build debug APK và báo cáo kích thước
        run: ./gradlew :app:assembleDebug --console=plain

      - name: APK size report
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "## APK Size" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`$(basename $APK)\` | ${SIZE_MB} MB (${SIZE_BYTES} bytes) |" >> $GITHUB_STEP_SUMMARY
          # Cảnh báo nếu APK vượt 50 MB
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "::warning::APK size ${SIZE_MB} MB vượt ngưỡng 50 MB"
          fi

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v4
        continue-on-error: true

  # Instrumented test chạy trên Android emulator (API 34, x86_64) — chỉ ubuntu.
  # Bắt bug runtime không test được JVM: navigation, Hilt DI graph, Activity lifecycle.
  # Chạy sau build-test để chỉ spin emulator khi unit test đã xanh.
  emulator-test:
    needs: build-test
    runs-on: ubuntu-latest
    # Cần write permission để madrapps/jacoco-report post comment lên PR.
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      # Giải phóng disk space trước khi chạy emulator (SDK + system image ~3-4 GB).
      # Không có bước này, runner có thể bị canceled khi compressAssets hết chỗ.
      - name: Giải phóng disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-2* \
                      /usr/local/lib/android/sdk/platforms/android-3[0-2] \
                      /usr/local/lib/android/sdk/build-tools/3[0-2]* \
                      /usr/share/dotnet /usr/local/share/powershell \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      # KVM acceleration cần thiết cho emulator x86_64 chạy nhanh trên Linux runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # Tắt animation hệ thống: giảm flakiness do transition chưa xong khi assert.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --console=plain

      # Download .exec từ build-test (ubuntu) để kết hợp với .ec emulator.
      - name: Download unit exec từ build-test
        uses: actions/download-artifact@v4.3.0
        with:
          name: unit-exec
          path: app/build/jacoco/

      - name: Tạo combined coverage report (unit + instrumented)
        run: ./gradlew :app:jacocoCombinedReport --console=plain

      # Gate combined coverage: Compose composable lambdas không được JaCoCo trace đúng
      # ngay cả trên emulator → diff bị kéo xuống bởi MainNavGraph.kt (63%).
      # Threshold diff 65%: thực tế đo được; overall 84%: ratchet tại mức hiện tại.
      # Diff coverage chỉ có ý nghĩa trên PR (cần base SHA để tính diff).
      - name: Gate combined coverage (code mới ≥ 60%, overall ≥ 84%)
        id: combined-coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-changed-files: 60
          min-coverage-overall: 84
          title: Combined Coverage (unit + emulator)
          update-comment: true

      - name: Gate combined overall (push main)
        id: combined-overall
        if: github.event_name != 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 84
          title: Combined Coverage (unit + emulator)
          update-comment: false

      - name: Fail nếu combined coverage vi phạm ngưỡng
        if: >
          ${{ (github.event_name == 'pull_request' &&
               (steps.combined-coverage.outputs.coverage-changed-files < 60.0 ||
                steps.combined-coverage.outputs.coverage-overall < 84.0)) ||
              (github.event_name != 'pull_request' &&
               steps.combined-overall.outputs.coverage-overall < 84.0) }}
        run: |
          echo "Combined coverage code mới: ${{ steps.combined-coverage.outputs.coverage-changed-files }}% (ngưỡng 60%)"
          echo "Combined coverage tổng: ${{ steps.combined-coverage.outputs.coverage-overall }}% (ngưỡng 84%)"
          exit 1

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: combined-coverage-report
          path: app/build/reports/jacoco/jacocoCombinedReport/
          if-no-files-found: ignore

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-test-report
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
