# CI — static analysis, unit test, emulator test chỉ chạy trên ubuntu-latest
# trên mỗi push vào main và mỗi PR.
# AuthSecrets.kt bị .gitignore (chứa secret Google Sign-In) nên CI tự ghi file stub
# với giá trị test để compile được — KHÔNG dùng cho production.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hủy run cũ khi có commit mới trên CÙNG PR để tiết kiệm runner.
# KHÔNG hủy run trên push main → mỗi commit main giữ được check đầy đủ
# (tránh hiển thị "cancelled" khi merge nhiều PR dồn dập).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Xác minh gradle-wrapper.jar không bị tamper (supply chain protection).
  # Chạy riêng trước mọi job khác để fail nhanh nếu wrapper bị giả mạo.
  wrapper-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

  # Phân tích tĩnh chỉ chạy 1 lần trên ubuntu.
  static-analysis:
    needs: wrapper-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # security-events: write để upload SARIF của Android Lint vào Code Scanning.
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Gate Room migration (issue #94): chặn bump DB version thiếu Migration/register/schema.
      # Pre-commit hook local có gate tương tự nhưng bypass được (--no-verify, clone chưa
      # install hook) — CI mới là lớp chặn thật. Chạy trước Gradle để fail nhanh (~1 giây).
      - name: Gate Room migration
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          sh scripts/check-room-migration.sh "origin/$GITHUB_BASE_REF" "HEAD"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Lint + detekt + ktlint
        run: ./gradlew lintDebug lintRelease detekt ktlintCheck --console=plain

      # Đẩy kết quả Android Lint vào GitHub Code Scanning → warning hiện inline
      # trong tab Security và annotation trên PR (sarifReport bật trong build.gradle.kts).
      - name: Upload Lint SARIF lên Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint
        continue-on-error: true

  build-test:
    needs: wrapper-validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      checks: write
      # pull-requests: write để comment danh sách screenshot lệch khi verify fail.
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      # verifyRoborazziDebug chạy chính testDebugUnitTest + so sánh screenshot với
      # goldens (src/test/screenshots) — không chạy test 2 lần, .exec coverage vẫn sinh ra.
      - name: Chạy unit test + verify screenshots
        run: ./gradlew :app:verifyRoborazziDebug --console=plain

      # Report so sánh ảnh (có diff image) khi screenshot verify fail.
      - name: Upload Roborazzi report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: roborazzi-report
          path: |
            app/build/reports/roborazzi/
            app/build/outputs/roborazzi/
          if-no-files-found: ignore

      # Comment danh sách golden bị lệch + link artifact thẳng lên PR — đỡ phải mở
      # log tìm artifact tay khi screenshot verify fail.
      - name: Comment screenshot diff lên PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFFS=$(find app/build/outputs/roborazzi -name '*_compare.png' 2>/dev/null | sed 's|.*/||; s|_compare\.png$||')
          [ -z "$DIFFS" ] && exit 0
          {
            echo "<!-- roborazzi-diff -->"
            echo "## 📸 Screenshot verify FAILED"
            echo ""
            echo "Golden bị lệch:"
            echo "$DIFFS" | sed 's/^/- `/; s/$/`/'
            echo ""
            echo "Ảnh diff: tải artifact **roborazzi-report** tại ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "UI đổi có chủ đích? → gắn label \`record-screenshots\` vào PR để re-record goldens."
          } > /tmp/roborazzi-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file /tmp/roborazzi-comment.md
        continue-on-error: true

      # Gate coverage per-package (jacocoCoverageVerification trong build.gradle.kts).
      # Trước đây task này KHÔNG được gọi ở đâu (chỉ wire vào `check` mà CI không chạy)
      # → gate giấy: main từng vi phạm 76.8% < 80% mà không ai biết.
      - name: Gate per-package coverage
        run: ./gradlew :app:jacocoCoverageVerification --console=plain

      - name: Upload unit test exec (ubuntu — dùng bởi emulator-test cho combined report)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-exec
          path: app/build/jacoco/testDebugUnitTest.exec
          if-no-files-found: error

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Build debug APK và báo cáo kích thước
        run: ./gradlew :app:assembleDebug --console=plain

      - name: APK size report
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "## APK Size" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`$(basename $APK)\` | ${SIZE_MB} MB (${SIZE_BYTES} bytes) |" >> $GITHUB_STEP_SUMMARY
          # Cảnh báo nếu APK vượt 50 MB
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "::warning::APK size ${SIZE_MB} MB vượt ngưỡng 50 MB"
          fi

      # Build release để bắt lỗi chỉ xuất hiện ở release variant (manifest, resource
      # shrink, và R8/proguard khi sau này bật isMinifyEnabled). APK unsigned — chỉ
      # để verify build, không phát hành.
      - name: Build release APK (verify release variant)
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        continue-on-error: true

  # Instrumented test chạy trên Android emulator (API 34, x86_64) — chỉ ubuntu.
  # Bắt bug runtime không test được JVM: navigation, Hilt DI graph, Activity lifecycle.
  # Chạy sau build-test để chỉ spin emulator khi unit test đã xanh.
  emulator-test:
    needs: build-test
    runs-on: ubuntu-latest
    # Emulator boot + instrumented test thường ~25-35 phút; treo quá 60 → kill sớm
    # thay vì chạy đến giới hạn 6h tốn quota runner.
    timeout-minutes: 60
    # Cần write permission để madrapps/jacoco-report post comment lên PR.
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      # Giải phóng disk space trước khi chạy emulator (SDK + system image ~3-4 GB).
      # Không có bước này, runner có thể bị canceled khi compressAssets hết chỗ.
      - name: Giải phóng disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-2* \
                      /usr/local/lib/android/sdk/platforms/android-3[0-2] \
                      /usr/local/lib/android/sdk/build-tools/3[0-2]* \
                      /usr/share/dotnet /usr/local/share/powershell \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      # KVM acceleration cần thiết cho emulator x86_64 chạy nhanh trên Linux runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache AVD + boot snapshot: lần đầu tạo AVD và boot đầy đủ để chụp snapshot,
      # các run sau emulator khởi động từ snapshot — cắt đáng kể thời gian boot.
      - name: AVD cache
        id: avd-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6-v1

      - name: Tạo AVD và chụp boot snapshot (chỉ khi cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot đã tạo để cache."

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # force-avd-creation: false + -no-snapshot-save → tái dùng AVD/snapshot từ cache,
          # không ghi đè snapshot sau khi test (giữ snapshot sạch).
          force-avd-creation: false
          # Tắt animation hệ thống: giảm flakiness do transition chưa xong khi assert.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --console=plain

      # Download .exec từ build-test (ubuntu) để kết hợp với .ec emulator.
      - name: Download unit exec từ build-test
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: unit-exec
          path: app/build/jacoco/

      - name: Tạo combined coverage report (unit + instrumented)
        run: ./gradlew :app:jacocoCombinedReport --console=plain

      # Gate combined coverage: Compose composable lambdas không được JaCoCo trace đúng
      # ngay cả trên emulator → diff bị kéo xuống bởi MainNavGraph.kt (63%).
      # Threshold diff 65%: thực tế đo được; overall 84%: ratchet tại mức hiện tại.
      # Diff coverage chỉ có ý nghĩa trên PR (cần base SHA để tính diff).
      - name: Gate combined coverage (code mới ≥ 85%, overall ≥ 85%)
        id: combined-coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-changed-files: 85
          min-coverage-overall: 85
          title: Combined Coverage (unit + emulator)
          update-comment: true

      - name: Gate combined overall (push main)
        id: combined-overall
        if: github.event_name != 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          title: Combined Coverage (unit + emulator)
          update-comment: false

      - name: Fail nếu combined coverage vi phạm ngưỡng
        if: >
          ${{ (github.event_name == 'pull_request' &&
               (steps.combined-coverage.outputs.coverage-changed-files < 85.0 ||
                steps.combined-coverage.outputs.coverage-overall < 85.0)) ||
              (github.event_name != 'pull_request' &&
               steps.combined-overall.outputs.coverage-overall < 85.0) }}
        run: |
          echo "Combined coverage code mới: ${{ steps.combined-coverage.outputs.coverage-changed-files }}% (ngưỡng 85%)"
          echo "Combined coverage tổng: ${{ steps.combined-coverage.outputs.coverage-overall }}% (ngưỡng 85%)"
          exit 1

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: combined-coverage-report
          path: app/build/reports/jacoco/jacocoCombinedReport/
          if-no-files-found: ignore

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: emulator-test-report
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
