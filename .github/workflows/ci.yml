# CI tối ưu — tránh chạy Gradle/emulator cho docs-only PR, gộp các Gradle task
# để giảm thời gian configuration, và đưa JVM coverage vào cùng job unit test.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
      emulator: ${{ steps.filter.outputs.emulator }}
      ui: ${{ steps.filter.outputs.ui }}
      # Danh sách FQCN feature-e2e cần exclude (comma-separated) — xem .github/e2e-test-map.json
      notclass: ${{ steps.filter.outputs.notclass }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          git diff --name-only "$BASE" HEAD | tee /tmp/changed.txt

          # Những file này có thể ảnh hưởng compile/test/lint Android.
          if grep -Eq '^(app/|gradle/|scripts/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|\.github/workflows/ci\.yml$)' /tmp/changed.txt; then
            echo "android=true" >> "$GITHUB_OUTPUT"
          else
            echo "android=false" >> "$GITHUB_OUTPUT"
          fi

          # Emulator chỉ cần cho thay đổi runtime/instrumented-test hoặc khi sửa CI/build.
          if grep -Eq '^(app/src/main/|app/src/androidTest/|app/build\.gradle\.kts$|build\.gradle\.kts$|settings\.gradle\.kts$|gradle/|gradle\.properties$|\.github/workflows/ci\.yml$)' /tmp/changed.txt; then
            echo "emulator=true" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=false" >> "$GITHUB_OUTPUT"
          fi

          # Screenshot verify chỉ cần khi thay đổi UI, theme, hoặc golden images.
          if grep -Eq '^app/src/(main/java/.*/ui/|main/res/|test/screenshots/)' /tmp/changed.txt; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui=false" >> "$GITHUB_OUTPUT"
          fi

          # Selective feature e2e (fail-open) — mapping khai báo tại .github/e2e-test-map.json.
          # Build danh sách notClass: feature nào PR KHÔNG đụng paths thì exclude test của nó.
          # PR match globalPaths (build files/DI/manifest/ci) hoặc push main → chạy ĐỦ suite.
          # Thêm feature e2e mới = thêm entry vào map file, KHÔNG sửa workflow.
          NOTCLASS=""
          MAP=.github/e2e-test-map.json
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -f "$MAP" ] && jq -e . "$MAP" > /dev/null 2>&1; then
            GLOBAL=$(jq -r '.globalPaths' "$MAP")
            if ! grep -Eq "$GLOBAL" /tmp/changed.txt; then
              while IFS=$'\t' read -r CLASS PATHS_RE; do
                if ! grep -Eq "$PATHS_RE" /tmp/changed.txt; then
                  NOTCLASS="${NOTCLASS:+$NOTCLASS,}$CLASS"
                  echo "Selective e2e: PR không đụng feature của $CLASS -> exclude"
                fi
              done < <(jq -r '.features[] | [.testClass, .paths] | @tsv' "$MAP")
            fi
          fi
          echo "notclass=$NOTCLASS" >> "$GITHUB_OUTPUT"

  wrapper-validation:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

  static-analysis:
    needs: [changes, wrapper-validation]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # security-events: write để upload SARIF của Android Lint vào Code Scanning.
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Gate Room migration
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          sh scripts/check-room-migration.sh "origin/$GITHUB_BASE_REF" "HEAD"

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          # Ghi cache cả từ PR branch: push liên tiếp trong cùng PR tái dùng
          # task outputs (FROM-CACHE) thay vì build lại từ đầu (default chỉ ghi từ main).
          cache-read-only: false

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Fast static checks (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew lintDebug detekt ktlintCheck --console=plain

      - name: Full static checks (main)
        if: github.event_name != 'pull_request'
        run: ./gradlew lintDebug lintRelease detekt ktlintCheck --console=plain

      # Đẩy kết quả Android Lint vào GitHub Code Scanning → warning hiện inline
      # trong tab Security và annotation trên PR (sarifReport bật trong build.gradle.kts).
      - name: Upload Lint SARIF lên Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint
        continue-on-error: true

  build-test:
    needs: [changes, wrapper-validation]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      checks: write
      # pull-requests: write để comment danh sách screenshot lệch khi verify fail.
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          # Ghi cache cả từ PR branch: push liên tiếp trong cùng PR tái dùng
          # task outputs (FROM-CACHE) thay vì build lại từ đầu (default chỉ ghi từ main).
          cache-read-only: false

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      # assembleRelease tách sang job release-build-check (chạy song song) để giảm
      # wall-clock của job này — emulator-test phải đợi build-test xong.
      - name: Unit test + coverage + debug APK
        env:
          RUN_SCREENSHOTS: ${{ needs.changes.outputs.ui }}
        run: |
          TEST_TASK=":app:testDebugUnitTest"
          if [ "$RUN_SCREENSHOTS" = "true" ]; then
            TEST_TASK=":app:verifyRoborazziDebug"
          fi
          ./gradlew \
            $TEST_TASK \
            :app:jacocoCoverageVerification \
            :app:jacocoTestReport \
            :app:assembleDebug \
            --console=plain

      - name: Upload Roborazzi report
        if: failure() && needs.changes.outputs.ui == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: roborazzi-report
          path: |
            app/build/reports/roborazzi/
            app/build/outputs/roborazzi/
          if-no-files-found: ignore

      - name: Comment screenshot diff lên PR
        if: failure() && github.event_name == 'pull_request' && needs.changes.outputs.ui == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFFS=$(find app/build/outputs/roborazzi -name '*_compare.png' 2>/dev/null | sed 's|.*/||; s|_compare\.png$||')
          [ -z "$DIFFS" ] && exit 0
          {
            echo "<!-- roborazzi-diff -->"
            echo "## Screenshot verify FAILED"
            echo ""
            echo "Golden bị lệch:"
            echo "$DIFFS" | sed 's/^/- `/; s/$/`/'
            echo ""
            echo "Ảnh diff: tải artifact **roborazzi-report** tại ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "UI đổi có chủ đích? → gắn label \`record-screenshots\` vào PR để re-record goldens."
          } > /tmp/roborazzi-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file /tmp/roborazzi-comment.md
        continue-on-error: true

      - name: Hiển thị JVM coverage thực tế từ XML
        if: always()
        run: |
          XML=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if [ ! -f "$XML" ]; then
            echo "Không có JaCoCo XML, bỏ qua summary."
            exit 0
          fi
          LINE=$(grep -o 'type="LINE" missed="[0-9]*" covered="[0-9]*"' "$XML" | tail -1)
          MISSED=$(echo "$LINE" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
          COVERED=$(echo "$LINE" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
          TOTAL=$((MISSED + COVERED))
          PCT=$(awk "BEGIN{printf \"%.2f\", $COVERED*100/$TOTAL}")
          echo "## JVM Coverage thực tế (LINE counter)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Overall LINE** | **${PCT}%** (${COVERED}/${TOTAL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Missed lines | ${MISSED} |" >> "$GITHUB_STEP_SUMMARY"

      # Informational — KHÔNG fail. Gate coverage thật là Combined (unit + emulator)
      # ở job emulator-test: unit-only overall phạt oan Compose UI code vốn được
      # cover bởi screenshot/emulator tests. Gate unit-level per-package (có excludes
      # hợp lý) vẫn enforce qua :app:jacocoCoverageVerification ở Gradle invocation trên.
      - name: JVM Coverage unit-only (informational)
        id: coverage-report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: JVM Coverage (unit-only, informational — gate thật là Combined)
          update-comment: true

      # Size report tuyệt đối đã bỏ — job size-diff (bên dưới) là nguồn duy nhất
      # về APK size, dùng lại artifact này thay vì build lần 2.
      - name: Upload debug APK (cho size-diff)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      # jacocoCoverageVerification đã chạy trong Gradle invocation ở trên — không gọi lại.

      - name: Upload unit test exec
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-exec
          path: app/build/jacoco/testDebugUnitTest.exec
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload JaCoCo XML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jvm-coverage-xml
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Submit dependency graph
        if: github.event_name == 'push'
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        continue-on-error: true

  # Smoke check R8/ProGuard: release build phải compile + minify thành công.
  # Output không ai tiêu thụ (release ký thật nằm ở release.yml) — job này chỉ
  # gác cổng keep rules/reflection bị strip, chạy song song với build-test.
  # Chỉ chạy trên PR: push main đã có release.yml build bản ký (smoke check tốt hơn).
  release-build-check:
    needs: [changes, wrapper-validation]
    if: github.event_name == 'pull_request' && needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          # Ghi cache cả từ PR branch: push liên tiếp trong cùng PR tái dùng
          # task outputs (FROM-CACHE) thay vì build lại từ đầu (default chỉ ghi từ main).
          cache-read-only: false

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Build release (R8 smoke check)
        run: ./gradlew :app:assembleRelease --console=plain

  emulator-test:
    needs: [changes, build-test]
    if: ${{ needs.changes.outputs.android == 'true' && (github.event_name == 'push' || needs.changes.outputs.emulator == 'true' || contains(github.event.pull_request.labels.*.name, 'run-emulator')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          # Ghi cache cả từ PR branch: push liên tiếp trong cùng PR tái dùng
          # task outputs (FROM-CACHE) thay vì build lại từ đầu (default chỉ ghi từ main).
          cache-read-only: false

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Giải phóng disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-2* \
                      /usr/local/lib/android/sdk/platforms/android-3[0-2] \
                      /usr/local/lib/android/sdk/build-tools/3[0-2]* \
                      /usr/share/dotnet /usr/local/share/powershell \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache AVD + boot snapshot: lần đầu tạo AVD và boot đầy đủ để chụp snapshot,
      # các run sau emulator khởi động từ snapshot — cắt đáng kể thời gian boot.
      - name: AVD cache
        id: avd-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (Node 24)
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6-v1

      - name: Tạo AVD và chụp boot snapshot (chỉ khi cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot đã tạo để cache."

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        env:
          # Selective feature e2e: core suite (smoke/navigation/migration) LUÔN chạy;
          # feature e2e exclude theo mapping .github/e2e-test-map.json (job changes tính sẵn).
          NOTCLASS: ${{ needs.changes.outputs.notclass }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # force-avd-creation: false + -no-snapshot-save → tái dùng AVD/snapshot từ cache,
          # không ghi đè snapshot sau khi test (giữ snapshot sạch).
          force-avd-creation: false
          # Tắt animation hệ thống: giảm flakiness do transition chưa xong khi assert.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # android-emulator-runner chạy script TỪNG DÒNG (mỗi dòng 1 lệnh sh -c riêng)
          # nên if/fi nhiều dòng sẽ vỡ — phải gói trong 1 dòng bằng ${VAR:+...}.
          script: ./gradlew connectedDebugAndroidTest ${NOTCLASS:+-Pandroid.testInstrumentationRunnerArguments.notClass=$NOTCLASS} --console=plain

      - name: Download unit exec từ build-test
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: unit-exec
          path: app/build/jacoco/

      - name: Tạo combined coverage report
        run: ./gradlew :app:jacocoCombinedReport --console=plain

      # Ngưỡng RATCHET theo mức thật (2026-06-13: overall 75.54%, app nhiều Compose UI
      # ceiling thấp): sàn chống tụt, siết dần khi trả nợ @Preview cho các screen 0%.
      # Ngưỡng 85% cũ đặt từ khi codebase nhỏ — không PR nào đạt nổi sau redesign.
      # Chỉ gate OVERALL — bỏ gate changed-files: PR đụng Compose UI / Firestore-sync
      # mapping (khó test JVM) bị changed-files false-block liên tục, vòng hạ ngưỡng vô tận.
      # Overall ≥ 60% vẫn chống tụt sức khỏe test tổng thể (vẫn comment changed-files để tham khảo).
      - name: Gate combined coverage (overall ≥ 60%)
        id: combined-coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          title: Combined Coverage (unit + emulator)
          update-comment: true

      # madrapps chỉ chạy trên PR (cần PR context, trên push trả output rỗng → so sánh
      # '' < 75 thành 0 < 75 → fail oan). Push main: tính thẳng từ XML bằng bash.
      - name: Gate combined overall (push main)
        if: github.event_name != 'pull_request'
        run: |
          XML=app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          if [ ! -f "$XML" ]; then
            echo "::error::Không có combined coverage XML."
            exit 1
          fi
          COUNTER=$(grep -o 'type="INSTRUCTION" missed="[0-9]*" covered="[0-9]*"' "$XML" | tail -1)
          MISSED=$(echo "$COUNTER" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
          COVERED=$(echo "$COUNTER" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
          PCT=$(awk "BEGIN{printf \"%.2f\", $COVERED*100/($MISSED+$COVERED)}")
          echo "Combined coverage tổng (INSTRUCTION): ${PCT}% (ngưỡng 60%)"
          awk "BEGIN{exit !($PCT >= 60.0)}" || { echo "::error::Combined coverage ${PCT}% dưới ngưỡng 60%"; exit 1; }

      - name: Fail nếu combined coverage overall vi phạm ngưỡng (PR)
        if: >
          ${{ github.event_name == 'pull_request' &&
              steps.combined-coverage.outputs.coverage-overall < 60.0 }}
        run: |
          echo "Combined coverage tổng: ${{ steps.combined-coverage.outputs.coverage-overall }}% (ngưỡng 60%)"
          exit 1

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: combined-coverage-report
          path: app/build/reports/jacoco/jacocoCombinedReport/
          if-no-files-found: ignore

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: emulator-test-report
          path: app/build/reports/androidTests/
          if-no-files-found: ignore

  # APK size diff — gộp từ apk-size-diff.yml: phía PR tái dùng artifact debug-apk
  # của build-test (không build lần 2), chỉ build phía base.
  size-diff-base:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout base
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          # Ghi cache cả từ PR branch: push liên tiếp trong cùng PR tái dùng
          # task outputs (FROM-CACHE) thay vì build lại từ đầu (default chỉ ghi từ main).
          cache-read-only: false

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Build APK base
        run: ./gradlew :app:assembleDebug --console=plain -q

      - name: Upload base APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: base-apk
          path: app/build/outputs/apk/debug/*.apk

  size-diff:
    needs: [changes, build-test, size-diff-base]
    if: github.event_name == 'pull_request' && needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Download PR APK (artifact từ build-test)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: debug-apk
          path: pr-apk

      - name: Download base APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: base-apk
          path: base-apk

      - name: So sánh và comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_APK=$(find pr-apk -name '*.apk' | head -1)
          BASE_APK=$(find base-apk -name '*.apk' | head -1)
          PR_SIZE=$(stat -c%s "$PR_APK")
          BASE_SIZE=$(stat -c%s "$BASE_APK")
          DELTA=$((PR_SIZE - BASE_SIZE))
          PR_MB=$(echo "scale=2; $PR_SIZE / 1048576" | bc)
          BASE_MB=$(echo "scale=2; $BASE_SIZE / 1048576" | bc)
          DELTA_KB=$(echo "scale=1; $DELTA / 1024" | bc)
          PCT=$(echo "scale=2; $DELTA * 100 / $BASE_SIZE" | bc)

          WARN=""
          if [ "$DELTA" -gt 1048576 ] || [ "$(echo "$PCT > 5" | bc)" -eq 1 ]; then
            WARN="⚠️ **APK tăng đáng kể — kiểm tra dependency/resource mới có cần thiết không.**"
          fi
          # Ngưỡng tuyệt đối (chuyển từ step "APK size report" cũ trong build-test)
          if [ "$PR_SIZE" -gt 52428800 ]; then
            echo "::warning::APK size ${PR_MB} MB vượt ngưỡng 50 MB"
          fi

          MARKER="<!-- apk-size-diff -->"
          BODY=$(cat <<BODY_EOF
          $MARKER
          ## 📦 APK size (debug)

          | | Base | PR | Chênh lệch |
          |---|---|---|---|
          | Size | ${BASE_MB} MB | ${PR_MB} MB | ${DELTA_KB} KB (${PCT}%) |

          $WARN
          BODY_EOF
          )

          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$EXISTING_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" -f body="$BODY" > /dev/null
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$BODY"
          fi
