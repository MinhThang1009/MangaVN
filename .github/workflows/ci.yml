# CI tối ưu — tránh chạy Gradle/emulator cho docs-only PR, gộp các Gradle task
# để giảm thời gian configuration, và đưa JVM coverage vào cùng job unit test.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
      emulator: ${{ steps.filter.outputs.emulator }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          git diff --name-only "$BASE" HEAD | tee /tmp/changed.txt

          # Những file này có thể ảnh hưởng compile/test/lint Android.
          if grep -Eq '^(app/|gradle/|scripts/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|\.github/workflows/ci\.yml$|\.github/workflows/coverage\.yml$)' /tmp/changed.txt; then
            echo "android=true" >> "$GITHUB_OUTPUT"
          else
            echo "android=false" >> "$GITHUB_OUTPUT"
          fi

          # Emulator chỉ cần cho thay đổi runtime/instrumented-test hoặc khi sửa CI/build.
          if grep -Eq '^(app/src/main/|app/src/androidTest/|app/build\.gradle\.kts$|build\.gradle\.kts$|settings\.gradle\.kts$|gradle/|gradle\.properties$|\.github/workflows/ci\.yml$)' /tmp/changed.txt; then
            echo "emulator=true" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=false" >> "$GITHUB_OUTPUT"
          fi

  wrapper-validation:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

  static-analysis:
    needs: [changes, wrapper-validation]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Gate Room migration
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          sh scripts/check-room-migration.sh "origin/$GITHUB_BASE_REF" "HEAD"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'KOTLIN'
          package com.example.mybookslibrary.util

          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          KOTLIN

      - name: Fast static checks (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew lintDebug detekt ktlintCheck --console=plain

      - name: Full static checks (main)
        if: github.event_name != 'pull_request'
        run: ./gradlew lintDebug lintRelease detekt ktlintCheck --console=plain

  build-test:
    needs: [changes, wrapper-validation]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      checks: write
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'KOTLIN'
          package com.example.mybookslibrary.util

          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          KOTLIN

      # Một Gradle invocation cho phần JVM/build để không mất configuration time nhiều lần.
      # verifyRoborazziDebug sinh testDebugUnitTest.exec; jacocoTestReport dùng lại kết quả đó.
      - name: Unit test + screenshots + coverage + APK builds
        run: |
          ./gradlew \
            :app:verifyRoborazziDebug \
            :app:jacocoCoverageVerification \
            :app:jacocoTestReport \
            :app:assembleDebug \
            :app:assembleRelease \
            --console=plain

      - name: Hiển thị JVM coverage thực tế từ XML
        if: always()
        run: |
          XML=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if [ ! -f "$XML" ]; then
            echo "Không có JaCoCo XML, bỏ qua summary."
            exit 0
          fi
          LINE=$(grep -o 'type="LINE" missed="[0-9]*" covered="[0-9]*"' "$XML" | tail -1)
          MISSED=$(echo "$LINE" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
          COVERED=$(echo "$LINE" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
          TOTAL=$((MISSED + COVERED))
          PCT=$(awk "BEGIN{printf \"%.2f\", $COVERED*100/$TOTAL}")
          echo "## JVM Coverage thực tế (LINE counter)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Overall LINE** | **${PCT}%** (${COVERED}/${TOTAL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Missed lines | ${MISSED} |" >> "$GITHUB_STEP_SUMMARY"

      - name: JVM overall coverage ≥ 85% (early check)
        id: coverage-report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          title: JVM Coverage (early check)
          update-comment: true

      - name: Fail nếu overall JVM coverage tụt dưới 85%
        if: ${{ github.event_name == 'pull_request' && steps.coverage-report.outputs.coverage-overall < 85.0 }}
        run: |
          echo "JVM coverage tổng: ${{ steps.coverage-report.outputs.coverage-overall }}% (ngưỡng 85%)"
          exit 1

      - name: APK size report
        if: always()
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1 || true)
          if [ -z "$APK" ]; then
            echo "Không tìm thấy debug APK, bỏ qua size report."
            exit 0
          fi
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "## APK Size" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`$(basename "$APK")\` | ${SIZE_MB} MB (${SIZE_BYTES} bytes) |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "::warning::APK size ${SIZE_MB} MB vượt ngưỡng 50 MB"
          fi

      - name: Upload Roborazzi report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: roborazzi-report
          path: |
            app/build/reports/roborazzi/
            app/build/outputs/roborazzi/
          if-no-files-found: ignore

      - name: Upload unit test exec
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-exec
          path: app/build/jacoco/testDebugUnitTest.exec
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload JaCoCo XML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jvm-coverage-xml
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Submit dependency graph
        if: github.event_name == 'push'
        uses: gradle/actions/dependency-submission@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        continue-on-error: true

  emulator-test:
    needs: [changes, build-test]
    if: ${{ needs.changes.outputs.android == 'true' && (github.event_name == 'push' || needs.changes.outputs.emulator == 'true' || contains(github.event.pull_request.labels.*.name, 'run-emulator')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'KOTLIN'
          package com.example.mybookslibrary.util
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          KOTLIN

      - name: Giải phóng disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-2* \
                      /usr/local/lib/android/sdk/platforms/android-3[0-2] \
                      /usr/local/lib/android/sdk/build-tools/3[0-2]* \
                      /usr/share/dotnet /usr/local/share/powershell \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --console=plain

      - name: Download unit exec từ build-test
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: unit-exec
          path: app/build/jacoco/

      - name: Tạo combined coverage report
        run: ./gradlew :app:jacocoCombinedReport --console=plain

      - name: Gate combined coverage (code mới ≥ 85%, overall ≥ 85%)
        id: combined-coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-changed-files: 85
          min-coverage-overall: 85
          title: Combined Coverage (unit + emulator)
          update-comment: true

      - name: Gate combined overall (push main)
        id: combined-overall
        if: github.event_name != 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          title: Combined Coverage (unit + emulator)
          update-comment: false

      - name: Fail nếu combined coverage vi phạm ngưỡng
        if: >
          ${{ (github.event_name == 'pull_request' &&
               (steps.combined-coverage.outputs.coverage-changed-files < 85.0 ||
                steps.combined-coverage.outputs.coverage-overall < 85.0)) ||
              (github.event_name != 'pull_request' &&
               steps.combined-overall.outputs.coverage-overall < 85.0) }}
        run: |
          echo "Combined coverage code mới: ${{ steps.combined-coverage.outputs.coverage-changed-files }}% (ngưỡng 85%)"
          echo "Combined coverage tổng: ${{ steps.combined-coverage.outputs.coverage-overall }}% (ngưỡng 85%)"
          exit 1

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: combined-coverage-report
          path: app/build/reports/jacoco/jacocoCombinedReport/
          if-no-files-found: ignore

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: emulator-test-report
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
