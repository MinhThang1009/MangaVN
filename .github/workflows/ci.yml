# CI — chạy unit test + static analysis trên mỗi push vào main và mỗi PR.
# AuthSecrets.kt bị .gitignore (chứa secret Google Sign-In) nên CI tự ghi file stub
# với giá trị test để compile được — KHÔNG dùng cho production.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Hủy run cũ khi có push mới trên cùng ref để tiết kiệm runner.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Stub AuthSecrets để build được trên CI (file thật bị gitignore).
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          // Stub chỉ dùng cho CI — giá trị test, không phải secret thật.
          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Chạy test + static analysis
        run: ./gradlew :app:testDebugUnitTest lintDebug detekt ktlintCheck --console=plain

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
