# Diff/patch coverage gate: chặn PR nếu CODE MỚI (dòng thay đổi trong PR) không được test đủ.
# Khác JaCoCo ratchet (đo TOÀN project) — gate này đo riêng phần thay đổi, bắt được
# feature mới quên viết test dù coverage tổng vẫn cao.
name: Coverage

on: pull_request

permissions:
  contents: read
  pull-requests: write # để comment kết quả coverage lên PR

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  diff-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # cần full history để diff PR base..head

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Stub AuthSecrets (file thật bị gitignore) — giá trị test, không phải secret.
      - name: Stub AuthSecrets
        run: |
          mkdir -p app/src/main/java/com/example/mybookslibrary/util
          cat > app/src/main/java/com/example/mybookslibrary/util/AuthSecrets.kt <<'EOF'
          package com.example.mybookslibrary.util

          object AuthSecrets {
              const val WEB_CLIENT_ID = "test-web-client-id.apps.googleusercontent.com"
          }
          EOF

      - name: Tạo báo cáo JaCoCo
        run: ./gradlew :app:jacocoTestReport --console=plain

      - name: Gate diff coverage (code mới ≥ 80%)
        id: coverage-report
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-changed-files: 80
          # Bật overall gate: PR không được làm tổng project tụt dưới 70%.
          # Khớp với sàn trong jacocoCoverageVerification (build.gradle.kts).
          min-coverage-overall: 70
          title: Coverage cho code mới (PR)
          update-comment: true

      # madrapps/jacoco-report không hỗ trợ fail-on-violation → đọc output và fail thủ công.
      # Bắt 2 vi phạm: (a) code mới < 80%, (b) tổng project tụt < 70%.
      - name: Fail nếu coverage vi phạm ngưỡng
        if: >
          ${{ steps.coverage-report.outputs.coverage-changed-files < 80.0 ||
              steps.coverage-report.outputs.coverage-overall < 70.0 }}
        run: |
          echo "Coverage code mới: ${{ steps.coverage-report.outputs.coverage-changed-files }}% (ngưỡng 80%)"
          echo "Coverage tổng project: ${{ steps.coverage-report.outputs.coverage-overall }}% (ngưỡng 70%)"
          exit 1
